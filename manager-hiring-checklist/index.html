<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>招聘面试必做清单</title>
  <meta name="description" content="给新经理使用的招聘面试必做清单，适合手机端学习和逐项核对。" />
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#f5f5f7;color:#1d1d1f;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Arial,sans-serif}body{overflow-x:hidden}.app{position:relative;width:100%;max-width:430px;min-height:100vh;margin:0 auto;padding-bottom:104px;background:#f5f5f7}.grabber{width:40px;height:6px;border-radius:999px;background:rgba(0,0,0,.1);margin:0 auto 8px}.header{position:sticky;top:0;z-index:30;padding:max(14px,env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid rgba(0,0,0,.04);background:rgba(245,245,247,.88);backdrop-filter:blur(24px)}.hero{border-radius:26px;background:rgba(255,255,255,.72);padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.04);outline:1px solid rgba(0,0,0,.04);backdrop-filter:blur(18px)}.row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.kicker{margin:0 0 4px;font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#86868b}.title{margin:0;font-size:26px;line-height:1.02;letter-spacing:-.055em}.controls{display:flex;gap:6px;flex-shrink:0}.pillBtn{border:0;border-radius:999px;padding:9px 12px;font-size:12px;font-weight:800;color:#6e6e73;background:#f5f5f7}.pillBtn.active{color:#fff;background:#1d1d1f}.info{overflow:hidden;margin:10px 0 0;font-size:13px;line-height:1.55;font-weight:600;color:#6e6e73;animation:softDrop .34s cubic-bezier(.18,.86,.28,1)}.filters{display:flex;gap:8px;overflow:auto;margin-top:12px;padding-bottom:1px;scrollbar-width:none}.filters::-webkit-scrollbar{display:none}.filterBtn{white-space:nowrap;border:0;border-radius:999px;padding:9px 14px;font-size:12px;font-weight:800;color:#6e6e73;background:rgba(255,255,255,.78);outline:1px solid rgba(0,0,0,.04)}.filterBtn.active{color:#fff;background:#1d1d1f}.section{padding:16px}.card{min-height:clamp(390px,58vh,520px);border-radius:32px;padding:20px;box-shadow:0 16px 52px rgba(0,0,0,.08);cursor:pointer;user-select:none;animation:leisureIn .56s cubic-bezier(.18,.86,.28,1)}.card.front{display:flex;flex-direction:column;background:#fff;outline:1px solid rgba(0,0,0,.04)}.card.back{display:flex;flex-direction:column;background:#1d1d1f;color:#fff;box-shadow:0 16px 52px rgba(0,0,0,.16);animation:flipIn .62s cubic-bezier(.18,.86,.28,1)}.tag{display:inline-flex;max-width:78%;border-radius:999px;padding:7px 12px;background:#f5f5f7;color:#6e6e73;font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.frontBody{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 0}.label{margin:0 0 12px;font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#86868b}.question{margin:0;font-size:32px;line-height:1.08;letter-spacing:-.055em}.backTop{display:flex;align-items:center;justify-content:space-between;gap:12px}.backTag{border-radius:999px;padding:7px 12px;background:rgba(255,255,255,.1);font-size:12px;font-weight:800;color:rgba(255,255,255,.7)}.hint{font-size:11px;font-weight:800;color:rgba(255,255,255,.42)}.backBody{flex:1;margin-top:20px;overflow:auto;padding-right:4px;scrollbar-width:none}.backBody::-webkit-scrollbar{display:none}.backLabel{margin:0 0 6px;font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.42)}.answer{margin:0 0 16px;font-size:15px;line-height:1.8;font-weight:600;color:rgba(255,255,255,.9)}.sample{margin:0 0 16px;border-radius:23px;padding:16px;background:rgba(255,255,255,.08);outline:1px solid rgba(255,255,255,.1)}.sample p{margin:0;font-size:14.5px;line-height:1.8;color:rgba(255,255,255,.9)}.keywordBox{display:flex;flex-wrap:wrap;gap:8px}.keyword{border-radius:999px;padding:7px 12px;background:#fff;color:#1d1d1f;font-size:12px;font-weight:800}.list{border-radius:29px;background:rgba(255,255,255,.85);padding:8px;box-shadow:0 1px 2px rgba(0,0,0,.04);outline:1px solid rgba(0,0,0,.04)}.listItem{display:flex;width:100%;align-items:center;justify-content:space-between;gap:12px;border:0;border-radius:22px;background:transparent;padding:14px 12px;text-align:left}.listItem:active{background:rgba(0,0,0,.04)}.listTitle{margin:0;font-size:15px;font-weight:800;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.listMeta{margin:4px 0 0;font-size:12px;font-weight:700;color:#86868b}.num{display:grid;place-items:center;flex-shrink:0;width:32px;height:32px;border-radius:999px;background:#f5f5f7;color:#86868b;font-size:12px;font-weight:800}.guide{display:grid;gap:12px}.guideCard{border-radius:26px;background:rgba(255,255,255,.85);padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.04);outline:1px solid rgba(0,0,0,.04)}.guideRow{display:flex;gap:12px}.step{display:grid;place-items:center;flex-shrink:0;width:32px;height:32px;border-radius:999px;background:#007aff;color:#fff;font-size:13px;font-weight:800}.guideTitle{margin:0;font-size:16px;letter-spacing:-.025em}.guideText{margin:5px 0 0;font-size:13.5px;line-height:1.75;font-weight:600;color:#6e6e73}.nav{position:fixed;left:50%;bottom:0;z-index:40;width:100%;max-width:430px;transform:translateX(-50%);padding:10px 16px max(14px,env(safe-area-inset-bottom));background:rgba(245,245,247,.8);backdrop-filter:blur(24px)}.navInner{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;border-radius:23px;background:rgba(255,255,255,.9);padding:4px;box-shadow:0 8px 28px rgba(0,0,0,.1);outline:1px solid rgba(0,0,0,.04)}.navBtn{border:0;border-radius:17px;background:transparent;padding:9px 4px;text-align:center;color:#8e8e93}.navBtn.active{background:#eaf3ff;color:#007aff;box-shadow:0 1px 2px rgba(0,0,0,.04)}.navIcon{font-size:14px;font-weight:800;line-height:1}.navText{margin-top:5px;font-size:10px;font-weight:800;line-height:1}@media(min-width:640px){.app{margin:16px auto;min-height:820px;border-radius:40px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.1)}.grabber{display:none}.nav{bottom:16px;border-radius:0 0 40px 40px}}@keyframes softDrop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}@keyframes leisureIn{from{opacity:0;transform:translateX(var(--slide,48px)) translateY(6px) scale(.992) rotate(.35deg)}to{opacity:1;transform:translateX(0) translateY(0) scale(1) rotate(0)}}@keyframes flipIn{from{opacity:0;transform:rotateY(42deg) scale(.992)}to{opacity:1;transform:rotateY(0) scale(1)}}
  </style>
</head>
<body>
  <div id="app" class="app"></div>
  <script>
    const cards=[
      {id:1,category:"招聘前准备",level:"必做",question:"先确认这个岗位到底要解决什么问题。",answer:"经理不能一上来就看简历。必须先明确：这个岗位为什么要招、补什么能力、解决什么业务问题。否则后面筛人和面试都会变成凭感觉。",sample:"核对动作：写下这个岗位存在的原因。是补人手、补能力、替换低绩效，还是支持新业务？如果这个问题说不清，先不要开始面试。",keywords:["岗位原因","业务问题","补什么能力","不凭感觉"]},
      {id:2,category:"招聘前准备",level:"必做",question:"写清楚新人前三个月必须交付什么。",answer:"招聘标准必须落到具体结果。新经理至少要说清楚：新人入职30天、60天、90天分别应该做到什么。",sample:"核对动作：列出前三个月的关键交付。例如第一月熟悉流程，第二月独立处理基础任务，第三月能稳定完成核心工作。",keywords:["30天","60天","90天","交付结果"]},
      {id:3,category:"招聘前准备",level:"必做",question:"区分“必须会”和“可以培训”。",answer:"不是所有能力都必须入职前具备。经理要把岗位要求分层：哪些是不能妥协的硬要求，哪些是入职后可以教的能力。",sample:"核对动作：把要求分成两列。左边写必须具备，例如基础沟通、排班稳定、相关经验；右边写可以培训，例如内部系统、公司流程、产品细节。",keywords:["硬要求","可培训","避免过度要求","降低误判"]},
      {id:4,category:"招聘前准备",level:"关键",question:"把“好候选人”改写成可判断的行为标准。",answer:"‘认真负责、沟通能力强、学习能力好’太空。经理必须把这些词翻译成可观察行为，否则面试时无法判断。",sample:"核对动作：不要写‘沟通好’，改成‘能主动确认客户需求、复述重点、记录下一步，并在当天跟进’。",keywords:["行为标准","可观察","可追问","可评分"]},
      {id:5,category:"简历初筛",level:"必做",question:"先找岗位相关证据，不要先看包装。",answer:"简历筛选的第一步不是看学校、公司名或排版，而是看是否做过类似任务、承担过类似责任、服务过类似客户。",sample:"核对动作：在简历上标出与岗位直接相关的经历。如果只有漂亮描述，没有具体任务、结果或责任范围，面试时必须追问。",keywords:["相关经历","具体任务","责任范围","结果证据"]},
      {id:6,category:"简历初筛",level:"必做",question:"标记每份简历的疑点，面试时逐条验证。",answer:"经理不能只带着印象去面试。每份简历都要提前标出需要验证的地方，比如时间空档、职责模糊、结果夸张、跳槽频繁。",sample:"核对动作：面试前写下3个验证点。例如：这段客户维护是他本人负责还是团队负责？每天处理多少客户？结果怎么衡量？",keywords:["疑点标记","职责模糊","结果验证","面试追问"]},
      {id:7,category:"面试准备",level:"必做",question:"提前准备统一问题，不能临场随便聊。",answer:"每个候选人都应该围绕同一组核心问题评估。这样才能比较候选人，也能减少第一印象和聊天舒服带来的偏差。",sample:"核对动作：准备5到8个核心问题，每个问题对应一个能力点，比如执行力、沟通、抗压、学习能力、稳定性。",keywords:["统一问题","能力点","可比较","减少偏见"]},
      {id:8,category:"面试准备",level:"关键",question:"提前准备评分标准，而不是面完再凭感觉打分。",answer:"如果没有评分标准，面试很容易变成‘我觉得不错’。经理要提前定义什么叫优秀、合格、有风险、不合格。",sample:"核对动作：每个能力点设置1到5分标准。比如沟通能力5分=能主动确认需求、表达清楚、处理异议；3分=能基本表达；1分=表达混乱。",keywords:["评分表","分项标准","优秀/合格","有风险"]},
      {id:9,category:"面试执行",level:"必做",question:"少问感觉题，多问过去真实经历。",answer:"不要问‘你抗压能力强吗？’这种容易得到标准答案的问题。要让候选人讲过去真实发生过的事情。",sample:"核对动作：把感觉题改成行为题。不要问‘你责任心强吗？’，改问‘讲一次你发现任务可能延误时，你具体怎么处理？’",keywords:["行为面试","真实经历","少问感觉","具体例子"]},
      {id:10,category:"面试执行",level:"必做",question:"每个关键回答都要追问到细节。",answer:"候选人会说不等于真的做过。经理必须追问背景、任务、本人行动、结果和复盘，直到能判断真实性和能力水平。",sample:"核对动作：追问这5点：当时背景是什么？你负责哪部分？你具体做了什么？结果如何？如果重来一次你会怎么改？",keywords:["STAR","本人行动","具体结果","复盘"]},
      {id:11,category:"面试执行",level:"关键",question:"确认候选人本人贡献，不被“大项目”带跑。",answer:"候选人参与过大项目不代表他有对应能力。经理要确认他本人到底负责了哪一部分、做了哪些决策、产生了什么结果。",sample:"核对动作：当候选人一直说‘我们团队’时，必须追问：你个人负责哪一步？哪些决定是你做的？你交付了什么？",keywords:["本人贡献","不是团队光环","责任边界","个人结果"]},
      {id:12,category:"面试执行",level:"必做",question:"把岗位中的真实困难问出来。",answer:"面试不能只介绍好的一面。经理要让候选人理解岗位压力、节奏、客户类型、排班要求或重复性工作，避免入职后预期落差。",sample:"核对动作：明确说明岗位真实情况。例如：这个岗位高峰期节奏快，需要同时处理多个客户问题。你过去有没有类似经历？你是怎么处理的？",keywords:["真实预期","岗位压力","节奏","稳定性"]},
      {id:13,category:"候选人判断",level:"必做",question:"面试后按能力点记录证据。",answer:"面试结束后不要只写‘感觉不错’。必须记录候选人在每个能力点上的证据、风险和待验证问题。",sample:"核对动作：写成这种格式：沟通能力=4分，证据是能清楚复盘客户投诉处理；风险是复杂客户经验较少；入职后需要培训升级处理流程。",keywords:["证据记录","能力点","风险","待验证"]},
      {id:14,category:"候选人判断",level:"关键",question:"区分“会说话”和“能做事”。",answer:"表达能力强不等于执行能力强。经理要验证候选人是否真的有交付结果、接受反馈、持续改进和稳定完成任务的证据。",sample:"核对动作：对表达很好的候选人，继续问：你最后交付了什么？有没有被指出问题？你怎么改？后面结果有没有变好？",keywords:["表达不等于能力","交付结果","接受反馈","稳定执行"]},
      {id:15,category:"候选人判断",level:"必做",question:"识别并记录红旗信号。",answer:"红旗信号不一定马上淘汰，但必须记录并验证。常见红旗包括回答空泛、回避细节、只抱怨前公司、无法解释离职原因、对岗位不了解。",sample:"核对动作：如果候选人一直回避具体问题，不要自动脑补。记录为风险，并继续追问事实。如果仍讲不清，要降低评价。",keywords:["红旗信号","回避细节","抱怨过多","不了解岗位"]},
      {id:16,category:"公平合规",level:"必做",question:"只问和岗位相关的问题。",answer:"经理必须把面试问题集中在工作能力、工作经验、岗位要求和工作安排上。不要问与岗位无关的隐私问题或可能带来歧视风险的问题。",sample:"核对动作：不要问婚育、家庭、宗教政治等无关问题。若岗位需要周末轮班，直接问：这个岗位需要周末轮班，你是否可以满足这个工作安排？",keywords:["岗位相关","避免隐私","遵守HR流程","降低风险"]},
      {id:17,category:"公平合规",level:"关键",question:"用统一标准比较候选人，减少个人偏见。",answer:"经理不能因为候选人背景相似、聊天舒服、第一印象好就提高评分。必须回到统一问题、统一评分和事实证据。",sample:"核对动作：每位候选人面试后都用同一张评分表。录用理由必须写证据，而不是写‘感觉合适’。",keywords:["统一标准","事实证据","避免第一印象","减少偏见"]},
      {id:18,category:"录用决策",level:"必做",question:"录用前写清楚：为什么是这个人。",answer:"经理做录用决定前，必须说清楚这个候选人匹配岗位的证据、主要风险、入职后怎么带。说不清就说明判断还不够完整。",sample:"核对动作：写三句话：他适合的证据是什么？最大的风险是什么？入职后前30天我怎么帮助他达标？",keywords:["录用理由","匹配证据","风险","带教计划"]},
      {id:19,category:"录用决策",level:"关键",question:"不要为了快点补人而降低核心标准。",answer:"人手紧张时最容易误招。可以接受可培训短板，但不能放过诚信、态度、稳定性或岗位核心能力上的重大风险。",sample:"核对动作：问自己：这个人的短板是可以培训，还是会直接影响岗位核心结果？如果是核心能力缺失，不要因为缺人就勉强录用。",keywords:["不将就","核心标准","可培训短板","重大风险"]},
      {id:20,category:"入职承接",level:"必做",question:"录用后准备30天入职承接计划。",answer:"招聘不是发offer就结束。经理必须准备新人入职后的目标、培训、检查节点和反馈节奏，否则新人容易进来后没人带。",sample:"核对动作：准备30天计划。第一周熟悉流程，第二周做基础任务，第三周开始独立处理，第四周做一次正式反馈和能力评估。",keywords:["30天计划","培训安排","检查节点","反馈节奏"]}
    ];
    const categories=["全部",...Array.from(new Set(cards.map(c=>c.category)))];
    const state={category:"全部",index:0,flipped:false,view:"study",info:false,filter:false,dir:1};
    const app=document.getElementById("app");
    const visible=()=>state.category==="全部"?cards:cards.filter(c=>c.category===state.category);
    const cur=()=>visible()[Math.min(state.index,visible().length-1)]||cards[0];
    const h=s=>String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]));
    function setCategory(c){state.category=c;state.index=0;state.flipped=false;state.view="study";render()}
    function setView(v){state.view=v;render()}
    function flip(){state.flipped=!state.flipped;render()}
    function go(d){const arr=visible();state.dir=d==="next"?1:-1;state.flipped=false;state.index=d==="next"?(state.index+1)%arr.length:(state.index-1+arr.length)%arr.length;render()}
    function renderHeader(){return `<header class="header"><div class="grabber"></div><div class="hero"><div class="row"><div><p class="kicker">经理招聘工具</p><h1 class="title">招聘面试必做清单</h1></div><div class="controls"><button class="pillBtn ${state.info?'active':''}" onclick="state.info=!state.info;render()">说明</button><button class="pillBtn ${state.filter?'active':''}" onclick="state.filter=!state.filter;render()">筛选</button></div></div>${state.info?'<p class="info">给第一次负责招聘的新经理使用。按流程逐项确认，避免漏项、误判和凭感觉录用。</p>':''}</div>${state.filter?`<div class="filters">${categories.map(c=>`<button class="filterBtn ${state.category===c?'active':''}" onclick="setCategory('${c}')">${c}</button>`).join('')}</div>`:''}</header>`}
    function renderStudy(){const c=cur();const slide=state.dir>=0?'48px':'-48px';if(!state.flipped){return `<section class="section"><div class="card front" style="--slide:${slide}" id="card"><span class="tag">${h(c.category)}</span><div class="frontBody"><p class="label">必做动作</p><h2 class="question">${h(c.question)}</h2></div></div></section>`}return `<section class="section"><div class="card back" id="card"><div class="backTop"><span class="backTag">必做项说明</span><span class="hint">点击返回</span></div><div class="backBody"><p class="backLabel">为什么必须做</p><p class="answer">${h(c.answer)}</p><div class="sample"><p class="backLabel">怎么做 / 怎么核对</p><p>${h(c.sample)}</p></div><p class="backLabel">核对点</p><div class="keywordBox">${c.keywords.map(k=>`<span class="keyword">${h(k)}</span>`).join('')}</div></div></div></section>`}
    function renderList(){return `<section class="section"><div class="list">${visible().map((c,i)=>`<button class="listItem" onclick="state.index=${i};state.flipped=false;state.view='study';render()"><div style="min-width:0"><p class="listTitle">${h(c.question)}</p><p class="listMeta">${h(c.category)} · ${h(c.level)}</p></div><div class="num">${i+1}</div></button>`).join('')}</div></section>`}
    function renderGuide(){const items=[["1","先按流程核对","从招聘前准备开始，不要跳到面试环节。前面没定义清楚，后面就容易误判。"],["2","每项都要有证据","不要只说我知道了。每个必做项都要能拿出记录、标准、问题或评分依据。"],["3","面试时边问边验证","候选人的回答必须追问到具体经历、本人行动、结果和复盘。"],["4","录用前复查漏项","发offer前重新检查岗位标准、面试证据、风险记录和入职承接计划。"]];return `<section class="section"><div class="guide">${items.map(i=>`<div class="guideCard"><div class="guideRow"><div class="step">${i[0]}</div><div><h3 class="guideTitle">${i[1]}</h3><p class="guideText">${i[2]}</p></div></div></div>`).join('')}</div></section>`}
    function renderNav(){const tabs=[["study","学习卡","◎"],["list","项目清单","☰"],["guide","使用方法","i"]];return `<nav class="nav"><div class="navInner">${tabs.map(t=>`<button class="navBtn ${state.view===t[0]?'active':''}" onclick="setView('${t[0]}')"><div class="navIcon">${t[2]}</div><div class="navText">${t[1]}</div></button>`).join('')}</div></nav>`}
    function bindCard(){const el=document.getElementById('card');if(!el)return;let sx=0,sy=0,drag=false;el.addEventListener('click',()=>{if(!drag)flip()});el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;drag=false},{passive:true});el.addEventListener('touchmove',e=>{const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;if(Math.abs(dx)>18&&Math.abs(dx)>Math.abs(dy)){drag=true;el.style.transform=`translateX(${dx*.28}px) rotate(${dx*.008}deg)`}},{passive:true});el.addEventListener('touchend',e=>{const touch=e.changedTouches[0];const dx=touch.clientX-sx;el.style.transform='';setTimeout(()=>{if(Math.abs(dx)>74)go(dx<0?'next':'prev');else if(!drag)flip();drag=false},40)},{passive:true})}
    function render(){const body=state.view==='study'?renderStudy():state.view==='list'?renderList():renderGuide();app.innerHTML=renderHeader()+body+renderNav();bindCard()}
    window.state=state;window.render=render;window.setCategory=setCategory;window.setView=setView;render();
  </script>
</body>
</html>
