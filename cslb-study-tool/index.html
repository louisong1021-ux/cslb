function rotateQuestionOptions(question, index) {
  const options = Array.isArray(question.options) ? question.options : [];
  if (options.length < 2) return question;
  const originalCorrect = options[question.answer];
  const shift = index % options.length;
  const rotated = options.map((_, optionIndex) => options[(optionIndex - shift + options.length) % options.length]);
  return { ...question, options: rotated, answer: rotated.indexOf(originalCorrect) };
}

function shuffleArray(items) {
  return [...items].sort(() => Math.random() - 0.5);
}

function takeRandom(items, count) {
  return shuffleArray(items).slice(0, Math.min(count, items.length));
}

function buildMockQuestions(scenarioPool, calcPool, size = 100) {
  const fullScenarioPlan = [
    ["Planning and Estimating", 24],
    ["Rough Wiring", 19],
    ["Startup / Troubleshooting / Maintenance", 17],
    ["Finish Wiring and Trim", 14],
    ["Safety", 11]
  ];
  const quickScenarioPlan = [
    ["Planning and Estimating", 14],
    ["Rough Wiring", 11],
    ["Startup / Troubleshooting / Maintenance", 10],
    ["Finish Wiring and Trim", 8],
    ["Safety", 7]
  ];
  const calcCount = size >= 100 ? 15 : 10;
  const plan = size >= 100 ? fullScenarioPlan : quickScenarioPlan;
  const chosen = [];
  plan.forEach(([domain, count]) => {
    chosen.push(...takeRandom(scenarioPool.filter((q) => q.domain === domain), count));
  });
  chosen.push(...takeRandom(calcPool, calcCount));
  return shuffleArray(chosen).slice(0, size);
}

const rawQuestions = [...examQuestions, ...autoQuestions, ...calcQuestions];
const questions = rawQuestions.map(rotateQuestionOptions);

function speakEnglish(text, rate = 0.7) {
  if (typeof window === "undefined" || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "en-US";
  utterance.rate = rate;
  window.speechSynthesis.speak(utterance);
}

function PronounceWord({ text, rate = 0.7 }) {
  return (
    <button type="button" onClick={() => speakEnglish(text, rate)} className="font-black underline decoration-slate-300 underline-offset-4 hover:text-emerald-700">
      {text}
    </button>
  );
}

        ) : (
          <main className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"><div className="flex flex-wrap items-center justify-between gap-3"><div><p className="text-sm font-black text-emerald-600">{quizType === "unit" ? currentUnit.title : "专项练习"}</p><h2 className="text-2xl font-black text-slate-950">{quizSubtitle} · {quizTitle}</h2></div><div className="flex flex-wrap items-center gap-2"><button type="button" onClick={clearCurrentAnswers} className="rounded-lg border border-slate-200 bg-white px-3 py-2 text-xs font-black text-slate-700 shadow-sm hover:bg-slate-50">清空本次答案</button><div className="rounded-2xl bg-slate-50 px-4 py-3 text-right"><p className="text-xs font-bold text-slate-500">成绩</p><p className="text-2xl font-black text-slate-950">{scoreInQuiz}/{quizQuestions.length}</p><p className="text-xs text-slate-500">已完成 {answeredInQuiz}/{quizQuestions.length} · 正确率 {accuracyInQuiz}%</p></div></div></div>{quizType === "unit" && <div className="mt-4 flex flex-wrap gap-2 rounded-2xl border border-slate-200 bg-slate-50 p-2"><button type="button" onClick={() => setUnitQuizFilter("all")} className={(unitQuizFilter === "all" ? "bg-slate-950 text-white hover:bg-slate-900" : "bg-white text-slate-700 hover:bg-slate-100") + " rounded-lg border border-slate-200 px-3 py-1.5 text-xs font-black transition"}>全部</button><button type="button" onClick={() => setUnitQuizFilter("scenario")} className={(unitQuizFilter === "scenario" ? "bg-slate-950 text-white hover:bg-slate-900" : "bg-white text-slate-700 hover:bg-slate-100") + " rounded-lg border border-slate-200 px-3 py-1.5 text-xs font-black transition"}>情境题</button><button type="button" onClick={() => setUnitQuizFilter("card")} className={(unitQuizFilter === "card" ? "bg-slate-950 text-white hover:bg-slate-900" : "bg-white text-slate-700 hover:bg-slate-100") + " rounded-lg border border-slate-200 px-3 py-1.5 text-xs font-black transition"}>卡片题</button><button type="button" onClick={() => setUnitQuizFilter("calc")} className={(unitQuizFilter === "calc" ? "bg-slate-950 text-white hover:bg-slate-900" : "bg-white text-slate-700 hover:bg-slate-100") + " rounded-lg border border-slate-200 px-3 py-1.5 text-xs font-black transition"}>计算题</button></div>}{quizType === "mock" && <div className="mt-4 flex flex-wrap gap-2 rounded-2xl border border-slate-200 bg-slate-50 p-2"><button type="button" onClick={() => { setMockSize(60); setAnswers({}); setMockRun((old) => old + 1); }} className={(mockSize === 60 ? "bg-emerald-600 text-white hover:bg-emerald-700" : "bg-white text-slate-700 hover:bg-slate-100") + " rounded-lg border border-slate-200 px-3 py-1.5 text-xs font-black transition"}>快速模拟 60题</button><button type="button" onClick={() => { setMockSize(100); setAnswers({}); setMockRun((old) => old + 1); }} className={(mockSize === 100 ? "bg-emerald-600 text-white hover:bg-emerald-700" : "bg-white text-slate-700 hover:bg-slate-100") + " rounded-lg border border-slate-200 px-3 py-1.5 text-xs font-black transition"}>完整模拟 100题</button><button type="button" onClick={() => { setAnswers({}); setMockRun((old) => old + 1); }} className="rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-black text-slate-700 transition hover:bg-slate-100">重新抽题</button></div>}{answeredInQuiz === quizQuestions.length && quizQuestions.length > 0 && <div className={(accuracyInQuiz >= 80 ? "border-emerald-200 bg-emerald-50 text-emerald-900" : "border-amber-200 bg-amber-50 text-amber-900") + " mt-4 rounded-2xl border p-4"}><p className="text-sm font-black">完成报告</p><p className="mt-1 text-sm font-bold">{accuracyInQuiz >= 80 ? "通过建议：本次表现达到可继续模拟或回刷错题的水平。" : "通过建议：本次正确率偏低，先回看薄弱领域和错题本。"}</p>{weakDomains.length > 0 && <p className="mt-2 text-xs font-bold">薄弱领域：{weakDomains.map((item) => item.name + " " + item.percent + "%").join("；")}</p>}</div>}<div className="mt-4 grid gap-3 md:grid-cols-2">{Object.entries(quizStats.byDomain).map(([name, stat]) => <div key={name} className="rounded-xl border border-slate-200 bg-slate-50 p-3"><div className="flex items-center justify-between gap-2"><p className="text-xs font-black text-slate-700">{name}</p><p className="text-xs font-black text-emerald-700">{stat.correct}/{stat.answered || 0}</p></div><div className="mt-2 h-1.5 overflow-hidden rounded-full bg-white"><div className="h-full bg-emerald-500" style={{ width: (stat.answered ? Math.round((stat.correct / stat.answered) * 100) : 0) + "%" }} /></div></div>)}</div>{quizType === "wrong" && quizQuestions.length === 0 && <div className="mt-5 rounded-2xl border border-emerald-200 bg-emerald-50 p-5 text-emerald-900"><p className="text-base font-black">错题本目前是空的</p><p className="mt-2 text-sm font-bold leading-6">继续做单元小测、计算专项或最终模拟。答错的题会自动进入这里；连续答对 2 次后会自动移出。</p></div>}<div className="mt-5 space-y-4">{quizQuestions.map((q, displayIndex) => { const chosen = answers[q.id]; const answered = chosen !== undefined; return <div key={q.id} className="rounded-2xl border border-slate-200 p-4"><h3 className="text-base font-black text-slate-900">{displayIndex + 1}. {q.question}</h3><div className="mt-3 grid gap-2">{q.options.map((option, optionIndex) => { const isChosen = chosen === optionIndex; const isAnswer = q.answer === optionIndex; let style = "border-slate-200 bg-slate-50 text-slate-800 hover:border-emerald-400"; if (answered && isAnswer) style = "border-emerald-400 bg-emerald-100 text-emerald-800"; if (answered && isChosen && !isAnswer) style = "border-rose-400 bg-rose-100 text-rose-800"; return <button key={optionIndex} type="button" onClick={() => handleQuizAnswer(q, optionIndex)} className={("rounded-xl border px-3 py-2 text-left text-sm font-semibold transition " + style)}>{String.fromCharCode(65 + optionIndex)}. {option}</button>; })}</div>{answered && <div className="mt-3 rounded-xl bg-slate-50 p-3 text-sm font-bold text-slate-600"><p>{q.explain}</p>{wrongQuestionIds.includes(q.id) && <p className="mt-2 text-xs font-black text-rose-600">错题巩固：需要连续答对 2 次才会移出。当前正确次数：{wrongCorrectCounts[q.id] || 0}/2</p>}{q.sourceCardId && <button type="button" onClick={() => goToSourceCard(q.sourceCardId)} className="mt-2 rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-black text-slate-700 hover:bg-slate-100">回到对应学习卡 #{q.sourceCardId}</button>}</div>}</div>; })}</div></main>
        )}
        <div className="sticky bottom-2 z-20 mt-3 rounded-lg border border-slate-200 bg-white/90 px-2 py-1.5 shadow-sm backdrop-blur">
          <div className="flex flex-wrap items-center gap-1.5">
            <button type="button" title="快捷键：L" onClick={() => setMode("learn")} className={(mode === "learn" ? "bg-slate-950 text-white hover:bg-slate-900" : "bg-white text-slate-800 hover:bg-slate-50") + " rounded-lg border border-slate-200 px-2.5 py-1.5 text-[11px] font-black shadow-sm"}>学习卡</button>
            <button type="button" title="快捷键：R" onClick={() => setMode("guide")} className={(mode === "guide" ? "bg-slate-950 text-white hover:bg-slate-900" : "bg-white text-slate-800 hover:bg-slate-50") + " rounded-lg border border-slate-200 px-2.5 py-1.5 text-[11px] font-black shadow-sm"}>工具介绍</button>
            <button type="button" title="快捷键：U" onClick={() => { setQuizType("unit"); setMode("quiz"); }} className={(mode === "quiz" && quizType === "unit" ? "bg-emerald-600 text-white hover:bg-emerald-700" : "bg-white text-slate-800 hover:bg-slate-50") + " rounded-lg border border-slate-200 px-2.5 py-1.5 text-[11px] font-black shadow-sm"}>单元小测</button>
            <button type="button" title="快捷键：C" onClick={() => { setQuizType("calc"); setMode("quiz"); }} className={(mode === "quiz" && quizType === "calc" ? "bg-emerald-600 text-white hover:bg-emerald-700" : "bg-white text-slate-800 hover:bg-slate-50") + " rounded-lg border border-slate-200 px-2.5 py-1.5 text-[11px] font-black shadow-sm"}>计算专项</button>
            <button type="button" title="快捷键：F" onClick={() => { setQuizType("mock"); setMode("quiz"); }} className={(mode === "quiz" && quizType === "mock" ? "bg-emerald-600 text-white hover:bg-emerald-700" : "bg-white text-slate-800 hover:bg-slate-50") + " rounded-lg border border-slate-200 px-2.5 py-1.5 text-[11px] font-black shadow-sm"}>最终模拟</button>
            <button type="button" title="快捷键：W" onClick={() => { setQuizType("wrong"); setMode("quiz"); }} className={(mode === "quiz" && quizType === "wrong" ? "bg-rose-600 text-white hover:bg-rose-700" : "bg-white text-slate-800 hover:bg-slate-50") + " rounded-lg border border-slate-200 px-2.5 py-1.5 text-[11px] font-black shadow-sm"}>错题本</button>
            <span className="ml-auto text-[9px] font-bold text-slate-400">{APP_VERSION}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<C10StudyCardsPreview />);

    </script>
  </body>
</html>
