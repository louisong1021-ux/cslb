    <script type="text/babel" data-type="module">

      const cards = [
        {

          sample:
            "核对动作：不要写‘沟通好’，改成‘能主动确认客户需求、复述重点、记录下一步，并在当天跟进’。",
          keywords: ["行为标准", "可观察", "可追问", "可评分"],
        },
        {
          id: 5,
          category: "简历初筛",
          level: "必做",
          question: "先找岗位相关证据，不要先看包装。",
          answer:
            "简历筛选的第一步不是看学校、公司名或排版，而是看是否做过类似任务、承担过类似责任、服务过类似客户。",
          sample:
            "核对动作：在简历上标出与岗位直接相关的经历。如果只有漂亮描述，没有具体任务、结果或责任范围，面试时必须追问。",
          keywords: ["相关经历", "具体任务", "责任范围", "结果证据"],
        },
        {
          id: 6,
          category: "简历初筛",
          level: "必做",
          question: "标记每份简历的疑点，面试时逐条验证。",
          answer:
            "经理不能只带着印象去面试。每份简历都要提前标出需要验证的地方，比如时间空档、职责模糊、结果夸张、跳槽频繁。",
          sample:
            "核对动作：面试前写下3个验证点。例如：这段客户维护是他本人负责还是团队负责？每天处理多少客户？结果怎么衡量？",
          keywords: ["疑点标记", "职责模糊", "结果验证", "面试追问"],
        },
        {
          id: 7,
          category: "面试准备",
          level: "必做",
          question: "提前准备统一问题，不能临场随便聊。",
          answer:
            "每个候选人都应该围绕同一组核心问题评估。这样才能比较候选人，也能减少第一印象和聊天舒服带来的偏差。",
          sample:
            "核对动作：准备5到8个核心问题，每个问题对应一个能力点，比如执行力、沟通、抗压、学习能力、稳定性。",
          keywords: ["统一问题", "能力点", "可比较", "减少偏见"],
        },
        {
          id: 8,
          category: "面试准备",
          level: "关键",
          question: "提前准备评分标准，而不是面完再凭感觉打分。",
          answer:
            "如果没有评分标准，面试很容易变成‘我觉得不错’。经理要提前定义什么叫优秀、合格、有风险、不合格。",
          sample:
            "核对动作：每个能力点设置1到5分标准。比如沟通能力5分=能主动确认需求、表达清楚、处理异议；3分=能基本表达；1分=表达混乱。",
          keywords: ["评分表", "分项标准", "优秀/合格", "有风险"],
        },
        {
          id: 9,
          category: "面试执行",
          level: "必做",
          question: "少问感觉题，多问过去真实经历。",
          answer:
            "不要问‘你抗压能力强吗？’这种容易得到标准答案的问题。要让候选人讲过去真实发生过的事情。",
          sample:
            "核对动作：把感觉题改成行为题。不要问‘你责任心强吗？’，改问‘讲一次你发现任务可能延误时，你具体怎么处理？’",
          keywords: ["行为面试", "真实经历", "少问感觉", "具体例子"],
        },
        {
          id: 10,
          category: "面试执行",
          level: "必做",
          question: "每个关键回答都要追问到细节。",
          answer:
            "候选人会说不等于真的做过。经理必须追问背景、任务、本人行动、结果和复盘，直到能判断真实性和能力水平。",
          sample:
            "核对动作：追问这5点：当时背景是什么？你负责哪部分？你具体做了什么？结果如何？如果重来一次你会怎么改？",
          keywords: ["STAR", "本人行动", "具体结果", "复盘"],
        },
        {
          id: 11,
          category: "面试执行",
          level: "关键",
          question: "确认候选人本人贡献，不被“大项目”带跑。",
          answer:
            "候选人参与过大项目不代表他有对应能力。经理要确认他本人到底负责了哪一部分、做了哪些决策、产生了什么结果。",
          sample:
            "核对动作：当候选人一直说‘我们团队’时，必须追问：你个人负责哪一步？哪些决定是你做的？你交付了什么？",
          keywords: ["本人贡献", "不是团队光环", "责任边界", "个人结果"],
        },
        {
          id: 12,
          category: "面试执行",
          level: "必做",
          question: "把岗位中的真实困难问出来。",
          answer:
            "面试不能只介绍好的一面。经理要让候选人理解岗位压力、节奏、客户类型、排班要求或重复性工作，避免入职后预期落差。",
          sample:
            "核对动作：明确说明岗位真实情况。例如：这个岗位高峰期节奏快，需要同时处理多个客户问题。你过去有没有类似经历？你是怎么处理的？",
          keywords: ["真实预期", "岗位压力", "节奏", "稳定性"],
        },
        {
          id: 13,
          category: "候选人判断",
          level: "必做",
          question: "面试后按能力点记录证据。",
          answer:
            "面试结束后不要只写‘感觉不错’。必须记录候选人在每个能力点上的证据、风险和待验证问题。",
          sample:
            "核对动作：写成这种格式：沟通能力=4分，证据是能清楚复盘客户投诉处理；风险是复杂客户经验较少；入职后需要培训升级处理流程。",
          keywords: ["证据记录", "能力点", "风险", "待验证"],
        },
        {
          id: 14,
          category: "候选人判断",
          level: "关键",
          question: "区分“会说话”和“能做事”。",
          answer:
            "表达能力强不等于执行能力强。经理要验证候选人是否真的有交付结果、接受反馈、持续改进和稳定完成任务的证据。",
          sample:
            "核对动作：对表达很好的候选人，继续问：你最后交付了什么？有没有被指出问题？你怎么改？后面结果有没有变好？",
          keywords: ["表达不等于能力", "交付结果", "接受反馈", "稳定执行"],
        },
        {
          id: 15,
          category: "候选人判断",
          level: "必做",
          question: "识别并记录红旗信号。",
          answer:
            "红旗信号不一定马上淘汰，但必须记录并验证。常见红旗包括回答空泛、回避细节、只抱怨前公司、无法解释离职原因、对岗位不了解。",
          sample:
            "核对动作：如果候选人一直回避具体问题，不要自动脑补。记录为风险，并继续追问事实。如果仍讲不清，要降低评价。",
          keywords: ["红旗信号", "回避细节", "抱怨过多", "不了解岗位"],
        },
        {
          id: 16,
          category: "公平合规",
          level: "必做",
          question: "只问和岗位相关的问题。",
          answer:
            "经理必须把面试问题集中在工作能力、工作经验、岗位要求和工作安排上。不要问与岗位无关的隐私问题或可能带来歧视风险的问题。",
          sample:
            "核对动作：不要问婚育、家庭、宗教政治等无关问题。若岗位需要周末轮班，直接问：这个岗位需要周末轮班，你是否可以满足这个工作安排？",
          keywords: ["岗位相关", "避免隐私", "遵守HR流程", "降低风险"],
        },
        {
          id: 17,
          category: "公平合规",
          level: "关键",
          question: "用统一标准比较候选人，减少个人偏见。",
          answer:
            "经理不能因为候选人背景相似、聊天舒服、第一印象好就提高评分。必须回到统一问题、统一评分和事实证据。",
          sample:
            "核对动作：每位候选人面试后都用同一张评分表。录用理由必须写证据，而不是写‘感觉合适’。",
          keywords: ["统一标准", "事实证据", "避免第一印象", "减少偏见"],
        },
        {
          id: 18,
          category: "录用决策",
          level: "必做",
          question: "录用前写清楚：为什么是这个人。",
          answer:
            "经理做录用决定前，必须说清楚这个候选人匹配岗位的证据、主要风险、入职后怎么带。说不清就说明判断还不够完整。",
          sample:
            "核对动作：写三句话：他适合的证据是什么？最大的风险是什么？入职后前30天我怎么帮助他达标？",
          keywords: ["录用理由", "匹配证据", "风险", "带教计划"],
        },
        {
          id: 19,
          category: "录用决策",
          level: "关键",
          question: "不要为了快点补人而降低核心标准。",
          answer:
            "人手紧张时最容易误招。可以接受可培训短板，但不能放过诚信、态度、稳定性或岗位核心能力上的重大风险。",
          sample:
            "核对动作：问自己：这个人的短板是可以培训，还是会直接影响岗位核心结果？如果是核心能力缺失，不要因为缺人就勉强录用。",
          keywords: ["不将就", "核心标准", "可培训短板", "重大风险"],
        },
        {
          id: 20,
          category: "入职承接",
          level: "必做",
          question: "录用后准备30天入职承接计划。",
          answer:
            "招聘不是发offer就结束。经理必须准备新人入职后的目标、培训、检查节点和反馈节奏，否则新人容易进来后没人带。",
          sample:
            "核对动作：准备30天计划。第一周熟悉流程，第二周做基础任务，第三周开始独立处理，第四周做一次正式反馈和能力评估。",
          keywords: ["30天计划", "培训安排", "检查节点", "反馈节奏"],
        },
      ];

      const categoryOptions = ["全部", ...Array.from(new Set(cards.map((card) => card.category)))];

      function ManagerHiringChecklistApp() {
        const [selectedCategory, setSelectedCategory] = useState("全部");
        const [currentIndex, setCurrentIndex] = useState(0);
        const [flipped, setFlipped] = useState(false);
        const [view, setView] = useState("study");
        const [isDragging, setIsDragging] = useState(false);
        const [swipeDirection, setSwipeDirection] = useState(1);
        const [showInfo, setShowInfo] = useState(false);
        const [showFilter, setShowFilter] = useState(false);
        const [motionMode, setMotionMode] = useState("page");

        const filteredCards = useMemo(() => {
          return selectedCategory === "全部"
            ? cards
            : cards.filter((card) => card.category === selectedCategory);
        }, [selectedCategory]);

        const safeCurrentIndex = Math.min(currentIndex, Math.max(filteredCards.length - 1, 0));
        const currentCard = filteredCards[safeCurrentIndex] || cards[0];

        const goToCard = (direction) => {
          if (filteredCards.length === 0) return;
          setMotionMode("page");
          setSwipeDirection(direction === "next" ? 1 : -1);
          setFlipped(false);
          setCurrentIndex((prev) => {
            const normalizedIndex = Math.min(prev, filteredCards.length - 1);
            if (direction === "next") return (normalizedIndex + 1) % filteredCards.length;
            return (normalizedIndex - 1 + filteredCards.length) % filteredCards.length;
          });
        };

        const handleSwipeEnd = (event, info) => {
          const swipeDistance = info.offset.x;
          const swipeVelocity = info.velocity.x;
          const shouldSwipe = Math.abs(swipeDistance) > 74 || Math.abs(swipeVelocity) > 520;

          setTimeout(() => setIsDragging(false), 80);
          if (!shouldSwipe) return;

          if (swipeDistance < 0) {
            goToCard("next");
          } else {
            goToCard("prev");
          }
        };

        const handleCardTap = () => {
          if (!isDragging) {
            setMotionMode("flip");
            setFlipped((prev) => !prev);
          }
        };

        const changeCategory = (category) => {
          setMotionMode("page");
          setSelectedCategory(category);
          setCurrentIndex(0);
          setFlipped(false);
          setView("study");
        };

        const getCardMotion = () => {
          if (motionMode === "flip") {
            return {
              initial: { opacity: 0, rotateY: flipped ? 42 : -42, scale: 0.992 },
              animate: { opacity: 1, rotateY: 0, scale: 1, x: 0, y: 0 },
              exit: { opacity: 0, rotateY: flipped ? -42 : 42, scale: 0.992 },
              transition: { duration: 0.62, ease: [0.18, 0.86, 0.28, 1] },
            };
          }

          return {
            initial: {
              opacity: 0,
              scale: 0.992,
              x: swipeDirection >= 0 ? 48 : -48,
              y: 6,
              rotateZ: swipeDirection >= 0 ? 0.35 : -0.35,
            },
            animate: { opacity: 1, scale: 1, x: 0, y: 0, rotateZ: 0 },
            exit: {
              opacity: 0,
              scale: 0.992,
              x: swipeDirection >= 0 ? -48 : 48,
              y: -6,
              rotateZ: swipeDirection >= 0 ? -0.35 : 0.35,
            },
            transition: { duration: 0.56, ease: [0.18, 0.86, 0.28, 1] },
          };
        };

        const tabs = [
          ["study", "学习卡", "◎"],
          ["list", "项目清单", "☰"],
          ["guide", "使用方法", "i"],
        ];

        return (
          <main className="min-h-screen bg-[#f5f5f7] text-[#1d1d1f] antialiased [font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Arial,sans-serif]">
            <div className="mx-auto min-h-screen w-full max-w-[430px] bg-[#f5f5f7] pb-[104px] sm:my-4 sm:min-h-[820px] sm:overflow-hidden sm:rounded-[2.5rem] sm:shadow-2xl sm:shadow-black/10">
              <header className="sticky top-0 z-30 border-b border-black/[0.04] bg-[#f5f5f7]/88 px-4 pb-3 pt-[max(14px,env(safe-area-inset-top))] backdrop-blur-2xl">
                <div className="mx-auto mb-2 h-1.5 w-10 rounded-full bg-black/10 sm:hidden" />

                <div className="rounded-[1.65rem] bg-white/72 px-4 py-4 shadow-sm ring-1 ring-black/[0.04] backdrop-blur-xl">
                  <div className="flex items-start justify-between gap-3">
                    <div className="min-w-0">
                      <p className="text-[11px] font-bold uppercase tracking-[0.18em] text-[#86868b]">经理招聘工具</p>
                      <h1 className="mt-1 text-[26px] font-bold leading-[1.02] tracking-[-0.055em]">招聘面试必做清单</h1>
                    </div>
                    <div className="flex shrink-0 gap-1.5">
                      <button
                        onClick={() => setShowInfo((prev) => !prev)}
                        className={`rounded-full px-3 py-2 text-[12px] font-bold transition ${
                          showInfo ? "bg-[#1d1d1f] text-white" : "bg-[#f5f5f7] text-[#6e6e73]"
                        }`}
                      >
                        说明
                      </button>
                      <button
                        onClick={() => setShowFilter((prev) => !prev)}
                        className={`rounded-full px-3 py-2 text-[12px] font-bold transition ${
                          showFilter ? "bg-[#1d1d1f] text-white" : "bg-[#f5f5f7] text-[#6e6e73]"
                        }`}
                      >
                        筛选
                      </button>
                    </div>
                  </div>

                  <AnimatePresence initial={false}>
                    {showInfo && (
                      <motion.p
                        initial={{ height: 0, opacity: 0, marginTop: 0 }}
                        animate={{ height: "auto", opacity: 1, marginTop: 10 }}
                        exit={{ height: 0, opacity: 0, marginTop: 0 }}
                        transition={{ duration: 0.34, ease: [0.18, 0.86, 0.28, 1] }}
                        className="overflow-hidden text-[13px] font-medium leading-5 text-[#6e6e73]"
                      >
                        给第一次负责招聘的新经理使用。按流程逐项确认，避免漏项、误判和凭感觉录用。
                      </motion.p>
                    )}
                  </AnimatePresence>
                </div>

                <AnimatePresence initial={false}>
                  {showFilter && (
                    <motion.div
                      initial={{ height: 0, opacity: 0 }}
                      animate={{ height: "auto", opacity: 1 }}
                      exit={{ height: 0, opacity: 0 }}
                      transition={{ duration: 0.34, ease: [0.18, 0.86, 0.28, 1] }}
                      className="mt-3 overflow-hidden"
                    >
                      <div className="overflow-x-auto [-ms-overflow-style:none] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">
                        <div className="flex w-max gap-2 pr-4">
                          {categoryOptions.map((category) => (
                            <button
                              key={category}
                              onClick={() => changeCategory(category)}
                              className={`rounded-full px-3.5 py-2 text-[12px] font-bold transition-all duration-200 ${
                                selectedCategory === category
                                  ? "bg-[#1d1d1f] text-white shadow-sm"
                                  : "bg-white/78 text-[#6e6e73] ring-1 ring-black/[0.04] active:bg-white"
                              }`}
                            >
                              {category}
                            </button>
                          ))}
                        </div>
                      </div>
                    </motion.div>
                  )}
                </AnimatePresence>
              </header>

              {view === "study" && (
                <section className="px-4 pt-4">
                  <div className="block w-full text-left">
                    <AnimatePresence mode="wait" initial={false}>
                      {!flipped ? (
                        <motion.div
                          key={`front-${currentCard.id}-${selectedCategory}`}
                          {...getCardMotion()}
                          style={{ transformPerspective: 1000, transformStyle: "preserve-3d" }}
                          whileTap={{ scale: 0.997 }}
                          whileDrag={{ scale: 0.992 }}
                          drag="x"
                          dragConstraints={{ left: 0, right: 0 }}
                          dragElastic={0.18}
                          onDragStart={() => {
                            setMotionMode("page");
                            setIsDragging(true);
                          }}
                          onDragEnd={handleSwipeEnd}
                          onClick={handleCardTap}
                          role="button"
                          tabIndex={0}
                          className="flex min-h-[clamp(390px,58vh,520px)] cursor-grab flex-col rounded-[2rem] bg-white p-5 shadow-[0_16px_52px_rgba(0,0,0,0.08)] ring-1 ring-black/[0.04] active:cursor-grabbing"
                        >
                          <div className="flex items-center justify-between gap-3">
                            <span className="max-w-[78%] truncate rounded-full bg-[#f5f5f7] px-3 py-1.5 text-[12px] font-bold text-[#6e6e73]">
                              {currentCard.category}
                            </span>
                            <span className="text-[12px] font-bold text-[#86868b]">
                              {safeCurrentIndex + 1}/{filteredCards.length}
                            </span>
                          </div>

                          <div className="flex flex-1 flex-col justify-center py-6">
                            <p className="mb-3 text-[12px] font-bold uppercase tracking-[0.16em] text-[#86868b]">必做动作</p>
                            <h2 className="text-[32px] font-bold leading-[1.08] tracking-[-0.055em] text-[#1d1d1f]">
                              {currentCard.question}
                            </h2>
                            <p className="mt-6 text-[13px] font-semibold text-[#86868b]">点击翻面，左右滑动换卡</p>
                          </div>
                        </motion.div>
                      ) : (
                        <motion.div
                          key={`back-${currentCard.id}-${selectedCategory}`}
                          {...getCardMotion()}
                          style={{ transformPerspective: 1000, transformStyle: "preserve-3d" }}
                          whileTap={{ scale: 0.997 }}
                          whileDrag={{ scale: 0.992 }}
                          drag="x"
                          dragConstraints={{ left: 0, right: 0 }}
                          dragElastic={0.18}
                          onDragStart={() => {
                            setMotionMode("page");
                            setIsDragging(true);
                          }}
                          onDragEnd={handleSwipeEnd}
                          onClick={handleCardTap}
                          role="button"
                          tabIndex={0}
                          className="flex min-h-[clamp(390px,58vh,520px)] cursor-grab flex-col rounded-[2rem] bg-[#1d1d1f] p-5 text-white shadow-[0_16px_52px_rgba(0,0,0,0.16)] active:cursor-grabbing"
                        >
                          <div className="flex items-center justify-between gap-3">
                            <span className="rounded-full bg-white/10 px-3 py-1.5 text-[12px] font-bold text-white/70">
                              必做项说明
                            </span>
                            <span className="text-[11px] font-bold text-white/42">点击返回</span>
                          </div>

                          <div className="mt-5 flex-1 space-y-4 overflow-y-auto pr-1 [-ms-overflow-style:none] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">
                            <div>
                              <p className="mb-1.5 text-[12px] font-bold uppercase tracking-[0.14em] text-white/42">为什么必须做</p>
                              <p className="text-[15px] font-medium leading-7 text-white/90">{currentCard.answer}</p>
                            </div>

                            <div className="rounded-[1.45rem] bg-white/[0.08] p-4 ring-1 ring-white/10">
                              <p className="mb-1.5 text-[12px] font-bold uppercase tracking-[0.14em] text-white/42">怎么做 / 怎么核对</p>
                              <p className="text-[14.5px] leading-7 text-white/90">{currentCard.sample}</p>
                            </div>

                            <div>
                              <p className="mb-2.5 text-[12px] font-bold uppercase tracking-[0.14em] text-white/42">核对点</p>
                              <div className="flex flex-wrap gap-2">
                                {currentCard.keywords.map((keyword) => (
                                  <span key={keyword} className="rounded-full bg-white px-3 py-1.5 text-[12px] font-bold text-[#1d1d1f]">
                                    {keyword}
                                  </span>
                                ))}
                              </div>
                            </div>
                          </div>
                        </motion.div>
                      )}
                    </AnimatePresence>
                  </div>
                </section>
              )}

              {view === "list" && (
                <section className="px-4 pt-4">
                  <div className="rounded-[1.8rem] bg-white/85 p-2 shadow-sm ring-1 ring-black/[0.04] backdrop-blur-xl">
                    {filteredCards.map((card, index) => (
                      <button
                        key={card.id}
                        onClick={() => {
                          setCurrentIndex(index);
                          setFlipped(false);
                          setView("study");
                        }}
                        className="flex w-full items-center justify-between gap-3 rounded-[1.35rem] px-3 py-3.5 text-left transition active:bg-black/[0.04]"
                      >
                        <div className="min-w-0">
                          <p className="truncate text-[15px] font-bold tracking-[-0.02em] text-[#1d1d1f]">{card.question}</p>
                          <p className="mt-1 text-[12px] font-semibold text-[#86868b]">{card.category} · {card.level}</p>
                        </div>
                        <div className="grid h-8 w-8 shrink-0 place-items-center rounded-full bg-[#f5f5f7] text-[12px] font-bold text-[#86868b]">
                          {index + 1}
                        </div>
                      </button>
                    ))}
                  </div>
                </section>
              )}

              {view === "guide" && (
                <section className="px-4 pt-4">
                  <div className="space-y-3">
                    {[
                      ["1", "先按流程核对", "从招聘前准备开始，不要跳到面试环节。前面没定义清楚，后面就容易误判。"],
                      ["2", "每项都要有证据", "不要只说我知道了。每个必做项都要能拿出记录、标准、问题或评分依据。"],
                      ["3", "面试时边问边验证", "候选人的回答必须追问到具体经历、本人行动、结果和复盘。"],
                      ["4", "录用前复查漏项", "发offer前重新检查岗位标准、面试证据、风险记录和入职承接计划。"],
                    ].map(([step, title, body]) => (
                      <div key={step} className="rounded-[1.6rem] bg-white/85 p-4 shadow-sm ring-1 ring-black/[0.04] backdrop-blur-xl">
                        <div className="flex gap-3">
                          <div className="grid h-8 w-8 shrink-0 place-items-center rounded-full bg-[#007aff] text-[13px] font-bold text-white">{step}</div>
                          <div>
                            <h3 className="text-[16px] font-bold tracking-[-0.025em]">{title}</h3>
                            <p className="mt-1 text-[13.5px] font-medium leading-6 text-[#6e6e73]">{body}</p>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </section>
              )}

              <nav className="fixed bottom-0 left-1/2 z-40 w-full max-w-[430px] -translate-x-1/2 bg-[#f5f5f7]/80 px-4 pb-[max(14px,env(safe-area-inset-bottom))] pt-2.5 backdrop-blur-2xl sm:bottom-4 sm:rounded-b-[2.5rem]">
                <div className="grid grid-cols-3 gap-1 rounded-[1.45rem] bg-white/90 p-1 shadow-[0_8px_28px_rgba(0,0,0,0.10)] ring-1 ring-black/[0.04]">
                  {tabs.map(([key, label, icon]) => (
                    <button
                      key={key}
                      onClick={() => setView(key)}
                      className={`rounded-[1.05rem] px-1 py-2 text-center transition-all active:scale-[0.98] ${
                        view === key ? "bg-[#eaf3ff] text-[#007aff] shadow-sm" : "text-[#8e8e93]"
                      }`}
                    >
                      <div className="text-[14px] font-bold leading-none">{icon}</div>
                      <div className="mt-1 text-[10px] font-bold leading-none">{label}</div>
                    </button>
                  ))}
                </div>
              </nav>
            </div>
          </main>
        );
      }

      createRoot(document.getElementById("root")).render(<ManagerHiringChecklistApp />);
    </script>
  </body>
</html>
